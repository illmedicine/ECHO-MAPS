services:
  # ── Echo Maps API ──
  api:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./echo_maps:/app/echo_maps
      - ./models:/app/models
    depends_on:
      - postgres
      - milvus
    restart: unless-stopped

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: echo_maps
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Milvus Vector DB ──
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.11
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379

  milvus-minio:
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data
    volumes:
      - miniodata:/data

  milvus:
    image: milvusdb/milvus:v2.3-latest
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    volumes:
      - milvusdata:/var/lib/milvus
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  milvusdata:
  miniodata:
