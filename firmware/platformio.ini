[env:illy-bridge]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

monitor_speed = 115200
upload_speed = 921600

; Force PSRAM: FNK0086 has 8MB OPI PSRAM (board def says "no PSRAM" but hardware has it)
board_build.arduino.memory_type = qio_opi

build_flags =
    -DCONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=1
    -DCONFIG_MBEDTLS_TLS_CLIENT_ONLY=1
    ; --- FNK0086 Freenove ESP32-S3 DevKit hardware ---
    -DCONFIG_CAMERA_MODULE_FNK0086=1
    -DBOARD_HAS_PSRAM=1
    ; LCD: ST7789 240x320 via SPI
    -DLCD_WIDTH=240
    -DLCD_HEIGHT=320
    ; Camera OV3660 (detected via I2C)
    -DCAMERA_MODEL_FNK0086=1
    ; I2S microphone + DAC speaker
    -DCONFIG_I2S_MIC_ENABLED=1
    -DCONFIG_I2S_SPEAKER_ENABLED=1

board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv
